---
# Reusable test runner. To be called from other workflows.
name: pytest

on:
  workflow_call:
    inputs:
      test-files:
        description: "Space-separated pytest paths (empty = whole suite)"
        type: string
        default: ""
      python-versions:
        description: "JSON array of Python versions for the matrix"
        type: string
        default: '["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]'
      install-native-toolchains:
        description: "Install compilers/tools to build & run generated bindings"
        type: boolean
        default: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ${{ fromJSON(inputs.python-versions) }}
        include:
          - os: macos-latest
            python-version: "3.10"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      # jsonld-cli is used by the tests (incl. core), so always install it.
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - name: Install Python build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Install jsonld-cli
        run: |
          npm install -g jsonld-cli
      - name: Install Linux packages
        if: ${{ inputs.install-native-toolchains && runner.os == 'Linux' }}
        run: |
          sudo apt update
          sudo apt install -y build-essential doxygen graphviz
      - name: Install macOS packages
        if: ${{ inputs.install-native-toolchains && runner.os == 'macOS' }}
        run: |
          brew update
          brew install doxygen gcc graphviz
      - name: Build package
        run: |
          python -m build
      - name: Install package
        run: |
          pip install -e .[dev]
      - name: Run tests
        run: |
          pytest -v ${{ inputs.test-files }}
