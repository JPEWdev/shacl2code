---
name: Generate coverage

on:
  pull_request:
    # Skip docs and edits to other workflows; later patterns override earlier.
    paths: &trigger-paths
      - "**"
      - "!**/*.md"
      - "!LICENSE"
      - "!.github/ISSUE_TEMPLATE/**"
      - "!.github/workflows/**"
      - ".github/workflows/coverage-generate.yaml"
  push:
    branches:
      - "main"
    paths: *trigger-paths

permissions:
  contents: read

jobs:
  coverage:
    name: Generate coverage report
    runs-on: ubuntu-latest
    permissions:
      # Gives the action the necessary permissions for publishing new
      # comments in pull requests.
      pull-requests: write
      # Gives the action the necessary permissions for pushing data to the
      # python-coverage-comment-action branch, and for editing existing
      # comments (to avoid publishing multiple comments in the same PR)
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          sudo apt install -y build-essential doxygen graphviz
      - name: Install package
        run: |
          pip install -e .[dev]
      - name: Generate coverage report
        run: |
          pytest -v
      - name: Coverage comment
        id: coverage_comment
        uses: py-cov-action/python-coverage-comment-action@2b84cfb222691291ba358a586c13606f0a9c172c # v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Store Pull Request comment to be posted
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        if: steps.coverage_comment.outputs.COMMENT_FILE_WRITTEN == 'true'
        with:
          # If you use a different name, update COMMENT_ARTIFACT_NAME accordingly
          name: python-coverage-comment-action
          # If you use a different name, update COMMENT_FILENAME accordingly
          path: python-coverage-comment-action.txt

